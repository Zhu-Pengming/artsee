name: artsee_app
description: "Artiqore 艺见心 - 英国艺术留学平台"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.5.0
  go_router: ^14.2.0
  timeago: ^3.7.0
  shared_preferences: ^2.2.3
  file_picker: ^8.1.7
  url_launcher: ^6.3.2
  web: ^1.1.1
  image_picker: ^1.0.7
  http: ^1.2.2
  http_parser: ^4.0.0
  tencent_cloud_chat_sdk: ^9.0.7652+1
  speech_to_text: ^7.0.0
  permission_handler: ^11.3.0
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/fonts/
    - assets/images/
  fonts:
    - family: Noto Sans SC
      fonts:
        - asset: assets/fonts/NotoSansSC-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSansSC-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoSansSC-Bold.ttf
          weight: 700
    - family: Noto Serif SC
      fonts:
        - asset: assets/fonts/NotoSerifSC-Regular.otf
          weight: 400
        - asset: assets/fonts/NotoSerifSC-SemiBold.otf
          weight: 600
        - asset: assets/fonts/NotoSerifSC-Bold.otf
          weight: 700
