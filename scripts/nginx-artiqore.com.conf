# Artsee / Artiqore Next.js — artiqore.com
# 安装：复制到 /etc/nginx/conf.d/artiqore.com.conf ，执行 nginx -t && systemctl reload nginx
#
# SSL：artiqore.com / www.artiqore.com 的 A 记录须指向**本机公网 IP**（如 150.158.44.195）。
# Ubuntu：apt install certbot python3-certbot-nginx
#   certbot --nginx -d artiqore.com -d www.artiqore.com --agree-tos --no-eff-email -m YOUR_EMAIL --non-interactive
#
# 注意：不与 artsee.conf 重复定义 upstream，直接反代 127.0.0.1:3000。

server {
    listen 80;
    listen [::]:80;
    server_name artiqore.com www.artiqore.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}
