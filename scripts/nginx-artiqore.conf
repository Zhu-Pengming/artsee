# Nginx 配置: artiqore.com
# Flutter Web 作为主站 (/)，Next.js 处理 /admin 和 /api
#
# 部署位置: /etc/nginx/sites-available/artiqore.com
# 启用: ln -sf /etc/nginx/sites-available/artiqore.com /etc/nginx/sites-enabled/
# 测试: nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name artiqore.com www.artiqore.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name artiqore.com www.artiqore.com;

    # SSL 证书（Let's Encrypt / Certbot）
    ssl_certificate /etc/letsencrypt/live/artiqore.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/artiqore.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 日志
    access_log /var/log/nginx/artiqore.access.log;
    error_log /var/log/nginx/artiqore.error.log;

    # Next.js API 路由
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }

    # Next.js Admin 后台
    location /admin {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Next.js 静态资源 (_next)
    location /_next/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Flutter Web 主站（静态文件）
    location / {
        root /var/www/flutter-web;
        index index.html;
        try_files $uri $uri/ /index.html;

        # 缓存策略
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;
}
